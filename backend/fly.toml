# fly.toml — Tartı backend
#
# App name is a placeholder; `flyctl launch` will prompt to set it (or
# you can `flyctl apps create tarti-backend` first and skip the prompt).
# Frankfurt region for low latency to Turkish users; change `primary_region`
# if you'd rather host elsewhere.
#
# Scale-to-zero is enabled (min_machines_running = 0). First request after
# idle takes a cold-start hit (~1-2s). For a constantly-warm process set
# min to 1 — costs roughly $2/month per machine.

app = "tarti-backend"
primary_region = "fra"

[build]
  # Dockerfile lives next to this file in backend/.

[env]
  LOG_FORMAT = "json"
  # ALLOWED_ORIGINS is set via `flyctl secrets` so the landing/extension
  # production URLs aren't checked in. chrome-extension://* is allowed
  # via the regex baked into app/main.py.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  # Readiness probe — hits /api/ready, which does a `SELECT 1` against
  # Postgres. The check fails (and the machine stays out of rotation)
  # until migrations finish on first boot.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/api/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
