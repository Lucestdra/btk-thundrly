# Thundrly backend — Alembic config.
# The actual `sqlalchemy.url` is set by `alembic/env.py` from the same
# `DATABASE_URL` env var the application reads. The value below is only a
# placeholder so the ini parser doesn't complain when invoked standalone.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./app/data/observations.db
file_template = %%(year)04d%%(month)02d%%(day)02d_%%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
