name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-flight run if a newer commit lands on the same PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------
  # Backend — pytest. No real Gemini key in CI → heuristic fallback
  # path is exercised; that's by design.
  # ---------------------------------------------------------------
  backend:
    name: backend / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

  # ---------------------------------------------------------------
  # Extension — vitest + full build (tsc --noEmit + vite build).
  # Build catches type errors that the test suite would miss.
  # ---------------------------------------------------------------
  extension:
    name: extension / vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: Build (typecheck + vite)
        run: npm run build

  # ---------------------------------------------------------------
  # Landing — vitest + typecheck only (next build is heavy and adds
  # little signal beyond what tsc + tests cover).
  # ---------------------------------------------------------------
  landing:
    name: landing / vitest + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

  # ---------------------------------------------------------------
  # Schema drift gate — regenerate openapi.json + TS types, fail if
  # the working tree differs. Forces every PR that touches Pydantic
  # schemas to re-run the typegen and commit the result.
  # ---------------------------------------------------------------
  schema-drift:
    name: schema / drift check
    runs-on: ubuntu-latest
    needs: [backend, extension]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Regenerate OpenAPI spec
        working-directory: backend
        run: python -m scripts.dump_openapi

      - name: Regenerate TypeScript types
        working-directory: extension
        run: npm run types:gen

      - name: Fail if generated artifacts drift from committed
        run: |
          if ! git diff --exit-code shared/openapi.json shared/types/openapi.generated.ts; then
            echo "::error::Generated schema artifacts are stale. Regenerate locally and commit:"
            echo "  cd backend && python -m scripts.dump_openapi"
            echo "  cd ../extension && npm run types:gen"
            exit 1
          fi
