# Nginx reverse proxy for api.thundrly.com → backend container on
# 127.0.0.1:8000. Critical settings explained inline.
#
# Symlink into /etc/nginx/sites-enabled/ after certbot has issued
# certificates (it inserts the ssl_* lines automatically the first time).

server {
    listen 80;
    listen [::]:80;
    server_name api.thundrly.com;

    # Certbot completes the HTTP-01 challenge here, then auto-injects
    # an HTTPS server block + redirect on first issuance.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.thundrly.com;

    # Filled in by certbot after `sudo certbot --nginx -d api.thundrly.com`:
    # ssl_certificate /etc/letsencrypt/live/api.thundrly.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.thundrly.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Body limits ----
    # Largest expected request: AnalyzeRequest with ~25 review objects.
    # 1 MB is generous; tune down to 256k once we have real data.
    client_max_body_size 1m;

    # ---- Streaming-friendly defaults ----
    # NDJSON / SSE only works when nginx forwards bytes as they arrive.
    # Without these, nginx buffers the whole response → panel stays
    # stuck on "loading" until the backend closes the stream.
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    # ---- Standard reverse-proxy headers ----
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # The backend's RequestLoggingMiddleware echoes back X-Request-ID; if
    # the client supplies one (extension can generate per-click) it's
    # carried through cleanly.
    proxy_set_header X-Request-ID $http_x_request_id;

    # ---- Timeouts ----
    # Read timeout > Gemini's max response time. With both review + decision
    # using Gemini, a slow LLM hop can take 8-10s. Set generously.
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
