# Nginx reverse proxy for thundrly.com (and www) → landing container
# on 127.0.0.1:3000. Standard Next.js setup with one twist: the OG image
# route is dynamic, not static, so we don't aggressively cache it.

server {
    listen 80;
    listen [::]:80;
    server_name thundrly.com www.thundrly.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.thundrly.com;

    # ssl_certificate /etc/letsencrypt/live/thundrly.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/thundrly.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://thundrly.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name thundrly.com;

    # ssl_certificate /etc/letsencrypt/live/thundrly.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/thundrly.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    # Long-lived Next.js static assets — cache aggressively in the
    # browser. `_next/static/*` filenames include content hashes.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Dynamic OG image — rendered by `next/og` on demand.
    location ~ ^/(opengraph-image|twitter-image)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000;
    }
}
